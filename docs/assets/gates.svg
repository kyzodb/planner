  <circle cx="60" cy="18" r="5.5" fill="#3f6b50"/>
  <text x="430" y="22" font-size="11.5" fill="#6d8074" text-anchor="middle">board · the lifecycle refuses until reality agrees</text>

  <text x="22" y="62"  font-size="13" xml:space="preserve"><tspan fill="#6FAE8B">board&gt; </tspan><tspan fill="#c9d6cc">start_epic </tspan><tspan fill="#8fb5d6">#181</tspan><tspan fill="#c9d6cc"> </tspan><tspan fill="#a9cf9e">'epic/two-axis-substrate'</tspan></text>
  <text x="22" y="82"  font-size="13" xml:space="preserve"><tspan fill="#cf7e6b">refused: </tspan><tspan fill="#a9baaf">main is 2 commit(s) behind origin/main — pull before starting</tspan></text>

  <text x="22" y="112" font-size="13" xml:space="preserve"><tspan fill="#6FAE8B">board&gt; </tspan><tspan fill="#c9d6cc">start_epic </tspan><tspan fill="#8fb5d6">#181</tspan><tspan fill="#c9d6cc"> </tspan><tspan fill="#a9cf9e">'epic/two-axis-substrate'</tspan><tspan fill="#5f7266">   # after the pull</tspan></text>
  <text x="22" y="132" font-size="13" xml:space="preserve"><tspan fill="#5fc492">start_epic: </tspan><tspan fill="#c9d6cc">#181 on epic/two-axis-substrate — epic in Now, branch linked</tspan></text>

  <text x="22" y="162" font-size="13" xml:space="preserve"><tspan fill="#6FAE8B">board&gt; </tspan><tspan fill="#c9d6cc">start_story </tspan><tspan fill="#8fb5d6">#214</tspan></text>
  <text x="22" y="182" font-size="13" xml:space="preserve"><tspan fill="#cf7e6b">refused: </tspan><tspan fill="#a9baaf">#214 is not the next unstarted story in sub-issue order — next is #212</tspan></text>

  <text x="22" y="212" font-size="13" xml:space="preserve"><tspan fill="#6FAE8B">board&gt; </tspan><tspan fill="#c9d6cc">start_story </tspan><tspan fill="#8fb5d6">#212</tspan></text>
  <text x="22" y="232" font-size="13" xml:space="preserve"><tspan fill="#5fc492">start_story: </tspan><tspan fill="#c9d6cc">#212 In Progress on epic/two-axis-substrate</tspan></text>

  <line x1="22" y1="252" x2="838" y2="252" stroke="#1b2620"/>
  <text x="22" y="274" font-size="11.5" fill="#6d8074" xml:space="preserve">every gate is one named check; on refusal, nothing has mutated — fix the fact, call again</text>
