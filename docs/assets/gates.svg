<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 290" width="860" height="290" font-family="ui-monospace, 'JetBrains Mono', Menlo, Consolas, monospace" role="img" aria-label="A board session: start_epic refuses because main is behind origin, passes after a pull; start_story refuses a story out of sub-issue order, then starts the right one. Every refusal names one fact and nothing has mutated.">
