<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 330" width="860" height="330" font-family="ui-sans-serif, 'IBM Plex Sans', system-ui, sans-serif" role="img" aria-label="The board model: seven columns on one axis. Now, Next, and Later are epic horizon columns; a story in In Progress derives its horizon through its parent epic's column.">
  <rect x="2" y="2" width="846" height="326" rx="3" fill="#0c1310" stroke="#263229"/>

  <text x="28" y="40" font-size="18" font-weight="600" fill="#eef3ef">One axis, and horizons live on epics</text>
  <text x="28" y="62" font-size="12.5" fill="#7c8f83">A story's horizon is a derived read through its parent epic — stored nowhere, so it can never drift.</text>
  <line x1="28" y1="78" x2="832" y2="78" stroke="#263229"/>

  <!-- columns: Backlog, Now, In Progress, Blocked, Next, Later, Done -->
  <!-- x: 28, 142, 256, 370, 484, 598, 712 ; width 106, height 176 (y 96..272) -->

  <!-- Backlog (dim) -->
  <rect x="28" y="96" width="106" height="176" rx="3" fill="#0e1511" stroke="#1f2a23"/>
  <text x="81" y="118" text-anchor="middle" font-size="12" font-weight="600" fill="#7c8f83">Backlog</text>
  <text x="81" y="133" text-anchor="middle" font-size="9.5" fill="#55655c">hidden working store</text>
  <rect x="38" y="146" width="86" height="26" rx="2" fill="#121a15" stroke="#222d26"/>
  <rect x="44" y="156" width="52" height="3" fill="#3a473f"/>
  <rect x="38" y="180" width="86" height="26" rx="2" fill="#121a15" stroke="#222d26"/>
  <rect x="44" y="190" width="62" height="3" fill="#3a473f"/>
  <rect x="38" y="214" width="86" height="26" rx="2" fill="#121a15" stroke="#222d26"/>
  <rect x="44" y="224" width="44" height="3" fill="#3a473f"/>

  <!-- Now (horizon) -->
  <rect x="142" y="96" width="106" height="176" rx="3" fill="#101813" stroke="#35443b"/>
  <rect x="142" y="96" width="106" height="3" fill="#2F7E52"/>
  <text x="195" y="118" text-anchor="middle" font-size="12" font-weight="600" fill="#eef3ef">Now</text>
  <text x="195" y="133" text-anchor="middle" font-size="9.5" fill="#7c8f83">epics for now</text>
  <!-- epic card with progress -->
  <rect x="152" y="146" width="86" height="34" rx="2" fill="#18221c" stroke="#35443b"/>
  <rect x="158" y="155" width="58" height="3" fill="#a9baaf"/>
  <rect x="158" y="166" width="74" height="4" rx="2" fill="#1b2620"/>
  <rect x="158" y="166" width="25" height="4" rx="2" fill="#6FAE8B"/>
  <rect x="152" y="188" width="86" height="34" rx="2" fill="#18221c" stroke="#35443b"/>
  <rect x="158" y="197" width="48" height="3" fill="#a9baaf"/>
  <rect x="158" y="208" width="74" height="4" rx="2" fill="#1b2620"/>
  <rect x="158" y="208" width="0.1" height="4" fill="#6FAE8B"/>
  <rect x="152" y="230" width="86" height="34" rx="2" fill="#18221c" stroke="#35443b"/>
  <rect x="158" y="239" width="64" height="3" fill="#a9baaf"/>
  <rect x="158" y="250" width="74" height="4" rx="2" fill="#1b2620"/>
  <rect x="158" y="250" width="8" height="4" rx="2" fill="#6FAE8B"/>

  <!-- In Progress -->
  <rect x="256" y="96" width="106" height="176" rx="3" fill="#101813" stroke="#263229"/>
  <text x="309" y="118" text-anchor="middle" font-size="12" font-weight="600" fill="#eef3ef">In Progress</text>
  <text x="309" y="133" text-anchor="middle" font-size="9.5" fill="#7c8f83">on the epic branch</text>
  <!-- the active story card -->
  <rect x="266" y="168" width="86" height="40" rx="2" fill="#18221c" stroke="#6FAE8B"/>
  <rect x="272" y="178" width="56" height="3" fill="#c9d6cc"/>
  <rect x="272" y="186" width="40" height="3" fill="#55655c"/>
  <text x="272" y="202" font-size="8.5" fill="#8fc4a6">story · one at a time</text>

  <!-- Blocked -->
  <rect x="370" y="96" width="106" height="176" rx="3" fill="#101813" stroke="#263229"/>
  <text x="423" y="118" text-anchor="middle" font-size="12" font-weight="600" fill="#eef3ef">Blocked</text>
  <text x="423" y="133" text-anchor="middle" font-size="9.5" fill="#7c8f83">real, named blocker</text>
  <text x="423" y="196" text-anchor="middle" font-size="10" fill="#3a473f" font-style="italic">empty is the goal</text>

  <!-- Next (horizon) -->
  <rect x="484" y="96" width="106" height="176" rx="3" fill="#101813" stroke="#35443b"/>
  <rect x="484" y="96" width="106" height="3" fill="#2F7E52"/>
  <text x="537" y="118" text-anchor="middle" font-size="12" font-weight="600" fill="#eef3ef">Next</text>
  <text x="537" y="133" text-anchor="middle" font-size="9.5" fill="#7c8f83">epics for next</text>
  <rect x="494" y="146" width="86" height="34" rx="2" fill="#18221c" stroke="#35443b"/>
  <rect x="500" y="155" width="54" height="3" fill="#a9baaf"/>
  <rect x="500" y="166" width="74" height="4" rx="2" fill="#1b2620"/>
  <rect x="494" y="188" width="86" height="34" rx="2" fill="#18221c" stroke="#35443b"/>
  <rect x="500" y="197" width="66" height="3" fill="#a9baaf"/>
  <rect x="500" y="208" width="74" height="4" rx="2" fill="#1b2620"/>

  <!-- Later (horizon) -->
  <rect x="598" y="96" width="106" height="176" rx="3" fill="#101813" stroke="#35443b"/>
  <rect x="598" y="96" width="106" height="3" fill="#2F7E52"/>
  <text x="651" y="118" text-anchor="middle" font-size="12" font-weight="600" fill="#eef3ef">Later</text>
  <text x="651" y="133" text-anchor="middle" font-size="9.5" fill="#7c8f83">pull forward anytime</text>
  <rect x="608" y="146" width="86" height="34" rx="2" fill="#18221c" stroke="#35443b"/>
  <rect x="614" y="155" width="46" height="3" fill="#a9baaf"/>
  <rect x="614" y="166" width="74" height="4" rx="2" fill="#1b2620"/>

  <!-- Done (dim) -->
  <rect x="712" y="96" width="106" height="176" rx="3" fill="#0e1511" stroke="#1f2a23"/>
  <text x="765" y="118" text-anchor="middle" font-size="12" font-weight="600" fill="#7c8f83">Done</text>
  <text x="765" y="133" text-anchor="middle" font-size="9.5" fill="#55655c">closed with the move</text>
  <rect x="722" y="146" width="86" height="26" rx="2" fill="#121a15" stroke="#222d26"/>
  <rect x="728" y="156" width="50" height="3" fill="#3a473f"/>
  <rect x="722" y="180" width="86" height="26" rx="2" fill="#121a15" stroke="#222d26"/>
  <rect x="728" y="190" width="58" height="3" fill="#3a473f"/>

  <!-- derived-horizon link: story in In Progress -> epic in Now -->
  <path d="M 266,188 C 250,188 246,168 240,163" fill="none" stroke="#6FAE8B" stroke-width="1.5" stroke-dasharray="4 3"/>
  <circle cx="240" cy="163" r="2.5" fill="#6FAE8B"/>
  <!-- legend -->
  <line x1="28" y1="289" x2="48" y2="289" stroke="#6FAE8B" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="56" y="293" font-size="10.5" font-style="italic" fill="#8fc4a6">story → parent epic: the horizon is read through the link, never stored on the story</text>
  <rect x="592" y="281" width="10" height="10" rx="2" fill="#2F7E52"/>
  <text x="608" y="290" font-size="10.5" fill="#7c8f83">epic horizon columns</text>

  <line x1="28" y1="304" x2="832" y2="304" stroke="#1b2620"/>
  <text x="28" y="321" font-size="10.5" fill="#6d8074">Done closes the issue in the same motion — column and issue state are one fact, owned by one flow.</text>
</svg>
